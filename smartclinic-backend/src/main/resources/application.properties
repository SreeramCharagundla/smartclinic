spring.application.name=smartclinic-backend

# PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/medical_app
spring.datasource.username=admin
spring.datasource.password=admin
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false

# JWT (use a long random secret in production)
jwt.secret=SmartClinicJwtSecretKeyForDevelopmentOnlyUseStrongSecretInProduction
jwt.expiration-ms=86400000

# CORS (comma-separated origins; Angular dev server default)
cors.allowed-origins=http://localhost:4200

# Gemini (Spring AI Google GenAI)
spring.ai.google.genai.api-key=${GOOGLE_API_KEY:}
spring.ai.google.genai.project-id=gen-lang-client-0186355061
spring.ai.google.genai.location=us-central1
spring.ai.google.genai.chat.options.model=gemini-2.5-flash


spring.devtools.restart.enabled=false