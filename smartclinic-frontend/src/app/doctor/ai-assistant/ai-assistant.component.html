<button
  *ngIf="isPatientContextActive"
  class="copilot-handle"
  mat-mini-fab
  color="primary"
  type="button"
  (click)="toggleCopilot()"
  aria-label="Toggle AI Copilot"
>
  <mat-icon>{{ isCopilotOpen ? "chevron_right" : "chevron_left" }}</mat-icon>
</button>

<mat-drawer-container class="copilot-container" [autosize]="true">
  <mat-drawer-content>
    <ng-content></ng-content>
  </mat-drawer-content>

  <mat-drawer
    *ngIf="isPatientContextActive"
    position="end"
    mode="side"
    [opened]="isCopilotOpen"
    [style.width.px]="copilotWidth"
    class="copilot-drawer"
  >
    <div class="resize-handle" (mousedown)="startResize($event)"></div>

    <mat-card class="copilot-card">
      <mat-card-header>
        <mat-card-title>
          <mat-icon>psychology</mat-icon>
          Clinical AI Copilot
        </mat-card-title>
        <button
          mat-icon-button
          type="button"
          (click)="closeCopilot()"
          aria-label="Close AI Copilot"
        >
          <mat-icon>chevron_right</mat-icon>
        </button>
      </mat-card-header>

      <mat-card-content class="assistant-content">
        <div #messagesContainer class="messages-area">
          <div *ngIf="getVoiceStatusLabel()" class="voice-status-row">
            <mat-chip
              [color]="voiceStatus === 'AI_SPEAKING' ? 'accent' : 'primary'"
              highlighted
            >
              {{ getVoiceStatusLabel() }}
            </mat-chip>
          </div>

          <div
            *ngFor="let message of messages"
            class="message-row"
            [class.doctor-row]="message.role === 'user'"
            [class.ai-row]="message.role === 'assistant'"
          >
            <div
              class="message-bubble"
              [class.ai-bubble]="message.role === 'assistant'"
              [class.doctor-bubble]="message.role === 'user'"
            >
              <strong
                >{{ message.role === "user" ? "Doctor" : "AI" }}:</strong
              >
              <ng-container *ngIf="message.role === 'assistant'; else doctorText">
                <markdown [data]="message.content"></markdown>
              </ng-container>
              <ng-template #doctorText>{{ message.content }}</ng-template>
            </div>
          </div>
        </div>

        <div class="input-area">
          <mat-form-field appearance="outline" class="input-field">
            <mat-label>Type your message</mat-label>
            <input
              matInput
              [formControl]="messageControl"
              (keydown.enter)="onEnter($event)"
            />
          </mat-form-field>
          <button
            mat-icon-button
            type="button"
            (click)="toggleMic()"
            [color]="isMicActive || voiceStatus === 'AI_SPEAKING' ? 'accent' : undefined"
            [disabled]="!isPatientContextActive"
            [attr.aria-label]="isMicActive ? 'Stop voice input' : 'Start voice input'"
          >
            <mat-icon>
              {{
                isMicActive || voiceStatus === 'AI_SPEAKING'
                  ? 'mic'
                  : 'mic_off'
              }}
            </mat-icon>
          </button>
          <button
            mat-icon-button
            color="primary"
            type="button"
            (click)="sendMessage()"
            [disabled]="isResponding || isMicActive"
          >
            <mat-icon>send</mat-icon>
          </button>
        </div>
      </mat-card-content>
    </mat-card>
  </mat-drawer>
</mat-drawer-container>
