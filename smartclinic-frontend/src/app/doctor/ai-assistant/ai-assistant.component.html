<button
  *ngIf="isPatientContextActive"
  class="copilot-handle"
  mat-mini-fab
  color="primary"
  type="button"
  (click)="toggleCopilot()"
  aria-label="Toggle AI Copilot"
>
  <mat-icon>{{ isCopilotOpen ? 'chevron_right' : 'chevron_left' }}</mat-icon>
</button>

<mat-drawer-container class="copilot-container" [autosize]="true">
  <mat-drawer-content>
    <ng-content></ng-content>
  </mat-drawer-content>

  <mat-drawer
    *ngIf="isPatientContextActive"
    position="end"
    mode="side"
    [opened]="isCopilotOpen"
    [style.width]="copilotWidth"
    class="copilot-drawer"
  >
    <mat-card class="copilot-card">
      <mat-card-header>
        <mat-card-title>
          <mat-icon>psychology</mat-icon>
          Clinical AI Copilot
        </mat-card-title>
        <button mat-icon-button type="button" (click)="closeCopilot()" aria-label="Close AI Copilot">
          <mat-icon>chevron_right</mat-icon>
        </button>
      </mat-card-header>

      <mat-card-content class="assistant-content">
        <div #messagesContainer class="messages-area">
          <div
            *ngFor="let message of messages"
            class="message-row"
            [class.doctor-row]="message.sender === 'doctor'"
            [class.ai-row]="message.sender === 'ai'"
          >
            <div class="message-bubble">
              <strong>{{ message.sender === 'doctor' ? 'You' : 'Copilot' }}:</strong>
              {{ message.text }}
            </div>
          </div>
        </div>

        <div class="input-area">
          <mat-form-field appearance="outline" class="input-field">
            <mat-label>Type your message</mat-label>
            <input matInput [formControl]="messageControl" (keydown.enter)="onEnter($event)" />
          </mat-form-field>
          <button mat-icon-button color="primary" type="button" (click)="sendMessage()" [disabled]="isResponding">
            <mat-icon>send</mat-icon>
          </button>
        </div>
      </mat-card-content>
    </mat-card>
  </mat-drawer>
</mat-drawer-container>
